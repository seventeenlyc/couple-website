<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图标预览</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px;
            margin: 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 40px;
        }
        .section {
            margin-bottom: 50px;
        }
        .section h2 {
            color: #667eea;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }
        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
            margin-bottom: 20px;
        }
        .icon-item {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .icon-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .icon-item img {
            width: 120px;
            height: 120px;
            margin-bottom: 15px;
        }
        .icon-item h3 {
            margin: 0;
            color: #333;
            font-size: 16px;
        }
        .note {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            margin-top: 30px;
            border-radius: 5px;
        }
        .note strong {
            color: #856404;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 图标预览</h1>
        
        <div class="section">
            <h2>💕 爱心图标</h2>
            <div class="icon-grid">
                <div class="icon-item">
                    <img src="heart.svg" alt="爱心">
                    <h3>标准爱心</h3>
                </div>
                <div class="icon-item">
                    <img src="heart-emoji.svg" alt="爱心Emoji">
                    <h3>Emoji爱心</h3>
                </div>
            </div>
        </div>
        
        <div class="section">
            <h2>🐱 小猫图标</h2>
            <div class="icon-grid">
                <div class="icon-item">
                    <img src="cat.svg" alt="小猫">
                    <h3>标准小猫</h3>
                </div>
                <div class="icon-item">
                    <img src="cat-emoji.svg" alt="小猫Emoji">
                    <h3>Emoji小猫</h3>
                </div>
            </div>
        </div>
        
        <div class="section">
            <h2>🐶 小狗图标</h2>
            <div class="icon-grid">
                <div class="icon-item">
                    <img src="dog.svg" alt="小狗">
                    <h3>标准小狗</h3>
                </div>
                <div class="icon-item">
                    <img src="dog-emoji.svg" alt="小狗Emoji">
                    <h3>Emoji小狗</h3>
                </div>
            </div>
        </div>
        
        <div class="note">
            <strong>📝 说明：</strong>
            <ul>
                <li>所有图标都是SVG格式，可以无损缩放</li>
                <li>每种图标提供两个版本：标准版和Emoji风格版</li>
                <li>颜色使用渐变效果，更加生动</li>
                <li>可以直接在网页中使用，或导出为PNG格式</li>
            </ul>
        </div>
    </div>
</body>
</html>
